[project]
name = "verge-mlops"
version = "0.3.0"
description = "Model registry (shadow/canary/production) + PSI drift detection (spec §14 Phase 4)."
requires-python = ">=3.11"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["verge_mlops"]

[tool.hatch.build.targets.wheel.force-include]
"verge_mlops/samples/demo-registry.json" = "verge_mlops/samples/demo-registry.json"
