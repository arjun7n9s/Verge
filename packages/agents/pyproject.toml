[project]
name = "verge-agents"
version = "0.3.0"
description = "Deterministic tool-loop agents over the Verge platform APIs (advisory layer, never the safety path)."
requires-python = ">=3.11"
dependencies = [
    "verge-llm",
    "verge-schema",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["verge_agents"]

[tool.uv.sources]
verge-llm = { workspace = true }
verge-schema = { workspace = true }
