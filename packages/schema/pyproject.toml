[project]
name = "verge-schema"
version = "0.3.0"
description = "Verge canonical data model — the single source of truth shared across services."
requires-python = ">=3.11"
dependencies = ["pydantic>=2.6"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["verge_schema"]
