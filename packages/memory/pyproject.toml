[project]
name = "verge-memory"
version = "0.3.0"
description = "Cognee-backed incident, regulatory, and plant-context memory for Verge findings."
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "verge-schema",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["verge_memory"]

[tool.uv.sources]
verge-schema = { workspace = true }
