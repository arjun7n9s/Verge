# Kubernetes secrets template — copy to a local file and apply; never commit real values.
#
#   cp deploy/k8s/secret.example.yaml deploy/k8s/secret.local.yaml
#   # edit secret.local.yaml
#   kubectl apply -f deploy/k8s/secret.local.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: verge-secrets
  namespace: verge
type: Opaque
stringData:
  POSTGRES_PASSWORD: changeme
  MINIO_ACCESS_KEY: verge
  MINIO_SECRET_KEY: changeme-minio-secret
  VERGE_AUDIT_ANCHOR_SECRET: changeme-anchor-hmac-key
  # Optional: TLS material for ingress (pair with ingress-tls.yaml)
  # tls.crt: |
  #   ...
  # tls.key: |
  #   ...
