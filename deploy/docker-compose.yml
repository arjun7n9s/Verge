# Verge — single-box pilot / hackathon stack (spec §8).
# Production (air-gap): the same services on K3s in the OT-DMZ, LLM swapped to
# on-prem Ollama/vLLM. This compose is for dev and the hackathon demo only.
name: verge

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-verge}
      POSTGRES_USER: ${POSTGRES_USER:-verge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verge}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb/postgis.sql:/docker-entrypoint-initdb.d/10-postgis.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-verge}"]
      interval: 10s
      timeout: 5s
      retries: 10

  timescale:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: verge_ts
      POSTGRES_USER: ${POSTGRES_USER:-verge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verge}
    command: ["-p", "5433"]
    ports:
      - "5433:5433"
    volumes:
      - tsdata:/var/lib/postgresql/data
      - ./initdb/timescale.sql:/docker-entrypoint-initdb.d/10-timescale.sql:ro

  neo4j:
    image: neo4j:5.24-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-vergeverge}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-verge}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-vergeverge}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/verge-realm.json:/opt/keycloak/data/import/verge-realm.json:ro

  # Application tier — enable with `make up-app` (compose profile `app`).
  verge-api:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      VERGE_STORE: sql
      VERGE_DB_URL: postgresql+psycopg://${POSTGRES_USER:-verge}:${POSTGRES_PASSWORD:-verge}@postgres:5432/${POSTGRES_DB:-verge}
      REDPANDA_BROKERS: redpanda:9092
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-verge}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-vergeverge}
      MINIO_USE_SSL: "false"
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-verge}
      VERGE_AUTH_ENABLED: ${VERGE_AUTH_ENABLED:-false}
      VERGE_COGNEE_ENABLED: ${VERGE_COGNEE_ENABLED:-false}
      AIMLAPI_API_KEY: ${AIMLAPI_API_KEY:-}
      SPEECHMATICS_API_KEY: ${SPEECHMATICS_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  verge-console:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: apps/console/Dockerfile
      args:
        VITE_KEYCLOAK_URL: ${KEYCLOAK_URL:-http://localhost:8080}
        VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-verge}
        VITE_KEYCLOAK_CLIENT_ID: verge-console
    ports:
      - "8088:80"
    depends_on:
      verge-api:
        condition: service_healthy

  verge-risk-engine:
    profiles: ["stream"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile.risk-engine
    environment:
      REDPANDA_BROKERS: redpanda:9092
      VERGE_EVENTS_TOPIC: verge.events
    depends_on:
      redpanda:
        condition: service_healthy
      verge-api:
        condition: service_healthy
    restart: unless-stopped

  verge-replay-feed:
    profiles: ["stream"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile.replay-feed
    environment:
      REDPANDA_BROKERS: redpanda:9092
      VERGE_EVENTS_TOPIC: verge.events
      VERGE_REPLAY_JSONL: eval/replays/vizag-2025-01/events.jsonl
      VERGE_REPLAY_REALTIME: "30"
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  tsdata:
  neo4jdata:
  miniodata:
