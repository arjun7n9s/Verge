name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Sync workspace (locked)
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Test (whole workspace)
        run: uv run pytest
      - name: Eval harness vs baselines B0/B1/B2
        run: |
          for f in eval/replays/*/generate.py; do uv run python "$f"; done
          uv run verge replay --all
      - name: Upload replay report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replay-report
          path: eval/out/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from package.json "packageManager" — don't double-specify.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @verge/console typecheck
      - run: pnpm --filter @verge/console build
