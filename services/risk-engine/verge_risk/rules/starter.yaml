# Verge starter rule library (spec §14.5 step 3).
# Known fatal combinations drawn from OISD standards, the CSB database, and the
# public incident corpus. Plants adopt this and customize per zone; they do not
# author from zero. 30+ rules ship in the full library.
#
# Two families below:
#   * gas-LEL / gas-CO + hot-work / confined-space / changeover — the core coke-oven
#     and process combinations exercised by the Vizag/BP-Texas/Jaipur replays.
#   * broader OISD fatal combinations (toxic gases H2S/SO2/NH3/Cl2, oxygen
#     enrichment, and non-gas permits: isolation/LOTO, work-at-height, radiography,
#     excavation, electrical, line-breaking, hot-tapping, lifting, vessel entry).
#
# Plant-specific families (process-startup envelopes, tank-farm transfer) are
# authored during commissioning against the site's own equipment, not shipped
# here — so the compliance report honestly reports them as gaps until configured.

- id: hot-work-elevated-gas-changeover
  name: Hot work + rising flammable gas during shift changeover
  severity: critical
  base_confidence: 0.85
  all:
    - type: permit_active
      kind: hot-work
    - type: gas_near_threshold
      sensor_kind: gas-lel
      pct: 0.15
      min_rise_per_min: 0.0
    - type: shift_changeover
  forecast:
    sensor_kind: gas-lel

- id: hot-work-elevated-gas
